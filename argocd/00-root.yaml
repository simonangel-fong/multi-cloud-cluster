apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 00-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argoproj.io/finalizer
spec:
  project: default
  revisionHistoryLimit: 3
  source:
    repoURL: https://github.com/simonangel-fong/project-multi-cloud-k8s.git
    targetRevision: master
    path: argocd/app
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - CreateNamespace=true
